<!DOCTYPE html>


<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <h1>Visual Archive</h1>
    <p>Images, movies, and moments from the lab.</p>
  </header>

  <main class="gallery">

    <section class="panel">
      <img src="assets/image1.jpg" alt="Interesting image 1" />
      <div class="caption">
        <h2>Neural Landscape</h2>
        <p>A striking still image with biological texture.</p>
      </div>
    </section>

    <section class="panel">
      <video autoplay muted loop playsinline>
        <source src="assets/movie1.mp4" type="video/mp4" />
      </video>
      <div class="caption">
        <h2>Dynamic Activity</h2>
        <p>Looping movie embedded directly into the scroll.</p>
      </div>
    </section>

    <section class="panel">
      <img src="assets/image2.jpg" alt="Interesting image 2" />
      <div class="caption">
        <h2>Microscopic World</h2>
        <p>Another visual stop in the scrolling sequence.</p>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Visual Archive</p>
  </footer>

</body>
</html>
